<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends | Login</title>

    <link rel="icon" href="./assets/retrato.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    
</head>

<body>
    <div class="retrato-esquerda">
        <img src="./assets/retrato.png" alt="Retrato Friends">
    </div>

    <div class="container-direita">
        <div class="login-box">
            <img class="logo" src="./assets/logo.png" alt="Logo Friends">

            <h2>Bem-vindo de volta!</h2>
            <h3>Faça login para continuar</h3>

            <form action="php/verificar_usuario.php" method="post">
                <label>Usuário</label>
                <div class="input-box">
                    <img src="./assets/user.png" alt="Usuário">
                    <input id="usuario" name="usuario" type="text" placeholder="username">
                </div>

                <label>Senha</label>
                <div class="input-box">
                    <img src="./assets/password.png" alt="Senha">
                    <input id="senha" name="senha" type="password" placeholder="********">
                </div>

                <button type="submit" id="btnEntrar">Entrar</button>

                <p>
                    Não tem uma conta?
                    <a href="cadastro.html">Crie uma</a>
                </p>
            </form>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
