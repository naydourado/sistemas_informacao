<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends | Cadastro</title>

    <link rel="icon" href="./assets/retrato.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="retrato-esquerda">
        <img src="./assets/retrato.png" alt="Retrato Friends">
    </div>

    <div class="container-direita">
        <div class="login-box">
            <img class="logo" src="./assets/logo.png" alt="Logo Friends">

            <h2>Bem-vindo ao espaço!</h2>
            <h3>Crie uma conta para acessar</h3>

            <form action="home.html" method="post">
                <label>E-mail</label>
                <div class="input-box">
                    <img src="./assets/email.png" alt="Email">
                    <input type="email" placeholder="username@gmail.com">
                </div>

                <label>Usuário</label>
                <div class="input-box">
                    <img src="./assets/user.png" alt="Usuário">
                    <input type="text" placeholder="username">
                </div>

                <label>Senha</label>
                <div class="input-box">
                    <img src="./assets/password.png" alt="Senha">
                    <input type="password" placeholder="********">
                </div>

                <button type="submit">Cadastrar</button>

                <p>
                    Já tem uma conta?
                    <a href="index.html">Entrar</a>
                </p>
            </form>
        </div>
    </div>
</body>

</html>
