<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Teclado de Animais</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <article>
        <h1 id="titulo">Sons de Animais</h1>

        <section class="teclado">
            <button class="tecla tecla_gato">Gato</button>
            <button class="tecla tecla_leao">Leão</button>
            <button class="tecla tecla_elefante">Elefante</button>
            <button class="tecla tecla_cavalo">Cavalo</button>
            <button class="tecla tecla_macaco">Macaco</button>
            <button class="tecla tecla_galinha">Galinha</button>
        </section>

        <audio src="sons/gatito.mp3" id="tecla_gato"></audio>
        <audio src="sons/leao.mp3" id="tecla_leao"></audio>
        <audio src="sons/elefante.mp3" id="tecla_elefante"></audio>
        <audio src="sons/cavalo.mp3" id="tecla_cavalo"></audio>
        <audio src="sons/macaco.mp3" id="tecla_macaco"></audio>
        <audio src="sons/galinha.mp3" id="tecla_galinha"></audio>
    </article>

    <script src="main.js"></script>
</body>

</html>
